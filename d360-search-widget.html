<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document360 Knowledge Base</title>
  <style>
    /* ── Config ─────────────────────────────────────────────── */
    :root {
      --brand:        #1E5FA8;
      --brand-dark:   #174d8a;
      --brand-light:  #e8f0fb;
      --brand-border: #c2d5f0;
      --text:         #1a1a2e;
      --muted:        #5a6a80;
      --surface:      #ffffff;
      --bg:           #f4f7fb;
      --radius:       8px;
      --shadow:       0 2px 8px rgba(30, 95, 168, 0.10);
    }

    /* ── Reset / Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .widget {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px 12px 32px;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: var(--brand);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg { display: block; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--brand);
      letter-spacing: -0.2px;
    }

    /* ── Search bar ──────────────────────────────────────────── */
    .search-wrapper {
      position: relative;
      margin-bottom: 14px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 10px 40px 10px 38px;
      border: 1.5px solid var(--brand-border);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #searchInput::placeholder { color: #9eafc0; }

    #searchInput:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(30, 95, 168, 0.15);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }

    .clear-btn:hover { background: var(--brand-light); color: var(--brand); }
    .clear-btn.visible { display: flex; }

    /* ── Status bar ──────────────────────────────────────────── */
    .status-bar {
      min-height: 22px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--brand-border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results list ────────────────────────────────────────── */
    #results { display: flex; flex-direction: column; gap: 10px; }

    /* ── Article card ────────────────────────────────────────── */
    .article-card {
      background: var(--surface);
      border: 1px solid var(--brand-border);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.18s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .article-card:hover {
      border-color: var(--brand);
      box-shadow: 0 4px 16px rgba(30, 95, 168, 0.14);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .article-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--brand);
      flex: 1;
      line-height: 1.35;
    }

    .category-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--brand);
      background: var(--brand-light);
      border: 1px solid var(--brand-border);
      border-radius: 20px;
      padding: 2px 8px;
      white-space: nowrap;
      flex-shrink: 0;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .article-summary {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }

    .open-btn:hover { background: var(--brand-dark); }
    .open-btn:active { transform: scale(0.97); }
    .open-btn svg { flex-shrink: 0; }

    /* ── Empty / Error states ────────────────────────────────── */
    .state-box {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
    }

    .state-box svg {
      display: block;
      margin: 0 auto 12px;
      opacity: 0.35;
    }

    .state-box p { font-size: 13px; }
    .state-box .state-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      padding: 14px 16px;
      color: #b91c1c;
      font-size: 13px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .error-box svg { flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>
<div class="widget">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <span class="header-title">Document360 Knowledge Base</span>
  </div>

  <!-- Search bar -->
  <div class="search-wrapper">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      id="searchInput"
      type="text"
      placeholder="Search knowledge base…"
      autocomplete="off"
      spellcheck="false"
      aria-label="Search knowledge base"
    />
    <button class="clear-btn" id="clearBtn" aria-label="Clear search" title="Clear">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar"></div>

  <!-- Results -->
  <div id="results">
    <!-- initial prompt state -->
    <div class="state-box" id="promptState">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1E5FA8"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p class="state-title">Search the knowledge base</p>
      <p>Type a question or keyword above to find articles.</p>
    </div>
  </div>

</div>

<script>
  /* ── CONFIG ──────────────────────────────────────────────────────────────
     Replace API_TOKEN with a valid Document360 API token.
     PROJECT_VERSION_ID: optional — leave empty ("") to search all versions.
  ──────────────────────────────────────────────────────────────────────── */
  const CONFIG = {
    API_TOKEN:          "2QPVL1kRxqpliaJpikJ6EPDIQjDPTw21ekIy+ktJINSXuBTrJurJ0dss4fYNFvergEjb4UPEpIQCqJZLimG4s3YcdNNty7EVU46Z0qDgOgj+BBvSo9HWvxso2s0n3K7rFRLOucz4dA+Gdlhm/RMMEg==",
    PROJECT_VERSION_ID: "9d17039f-a32b-4136-a6e6-15e92ab8bfa0",
    RESULTS_LIMIT:      10,       // max articles to show
    DEBOUNCE_MS:        300,      // ms to wait after typing stops
    BASE_URL:           "https://apihub.document360.io/v2/Articles/search",
    KB_BASE_URL:        "https://docs.document360.com",  // article link base (adjust if custom domain)
  };

  /* ── DOM refs ──────────────────────────────────────────────── */
  const input       = document.getElementById("searchInput");
  const clearBtn    = document.getElementById("clearBtn");
  const resultsEl   = document.getElementById("results");
  const statusBar   = document.getElementById("statusBar");

  /* ── State ─────────────────────────────────────────────────── */
  let debounceTimer = null;
  let currentQuery  = "";

  /* ── Helpers ───────────────────────────────────────────────── */
  function escape(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function setStatus(html) { statusBar.innerHTML = html; }

  function renderPromptState() {
    resultsEl.innerHTML = `
      <div class="state-box" id="promptState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1E5FA8"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p class="state-title">Search the knowledge base</p>
        <p>Type a question or keyword above to find articles.</p>
      </div>`;
    setStatus("");
  }

  function renderEmpty(query) {
    resultsEl.innerHTML = `
      <div class="state-box">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1E5FA8"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <p class="state-title">No results found</p>
        <p>No articles matched <strong>"${escape(query)}"</strong>. Try different keywords.</p>
      </div>`;
  }

  function renderError(msg) {
    resultsEl.innerHTML = `
      <div class="error-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>${escape(msg)}</span>
      </div>`;
    setStatus("");
  }

  function renderLoading() {
    setStatus(`<div class="spinner"></div><span>Searching…</span>`);
    resultsEl.innerHTML = "";
  }

  function articleUrl(article) {
    /* Prefer a direct slug/permalink if the API provides one */
    if (article.url)            return article.url;
    if (article.article_url)    return article.article_url;
    if (article.slug)           return `${CONFIG.KB_BASE_URL}/${article.slug}`;
    if (article.public_url)     return article.public_url;
    return null;
  }

  function categoryLabel(article) {
    /* Different API versions surface category in different fields */
    return article.category_name
        ?? article.category?.name
        ?? article.categoryName
        ?? null;
  }

  function summaryText(article) {
    /* Use clean description; fall back to raw text excerpt */
    return article.description
        ?? article.clean_text
        ?? article.text_excerpt
        ?? article.content_summary
        ?? "";
  }

  /* ── Render results ────────────────────────────────────────── */
  function renderResults(articles, query) {
    if (!articles || articles.length === 0) {
      renderEmpty(query);
      setStatus("");
      return;
    }

    const count = articles.length;
    setStatus(`<span>${count} result${count !== 1 ? "s" : ""} for <strong>"${escape(query)}"</strong></span>`);

    resultsEl.innerHTML = articles.map((art, i) => {
      const title    = escape(art.title || "Untitled article");
      const summary  = escape(summaryText(art));
      const category = categoryLabel(art);
      const url      = articleUrl(art);

      return `
        <div class="article-card" style="animation-delay:${i * 30}ms">
          <div class="card-top">
            <span class="article-title">${title}</span>
            ${category ? `<span class="category-badge" title="${escape(category)}">${escape(category)}</span>` : ""}
          </div>
          ${summary ? `<p class="article-summary">${summary}</p>` : ""}
          <div class="card-footer">
            ${url
              ? `<a class="open-btn" href="${escape(url)}" target="_blank" rel="noopener noreferrer">
                   Open Article
                   <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                     <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                     <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                   </svg>
                 </a>`
              : `<span style="font-size:12px;color:var(--muted)">No link available</span>`
            }
          </div>
        </div>`;
    }).join("");
  }

  /* ── API call ──────────────────────────────────────────────── */
  async function search(query) {
    if (!query.trim()) { renderPromptState(); return; }

    currentQuery = query;
    renderLoading();

    const params = new URLSearchParams({ query: query.trim() });
    if (CONFIG.PROJECT_VERSION_ID) params.set("projectVersionId", CONFIG.PROJECT_VERSION_ID);
    params.set("limit", CONFIG.RESULTS_LIMIT);

    const url = `${CONFIG.BASE_URL}?${params}`;

    try {
      const res = await fetch(url, {
        method: "GET",
        headers: {
          "api_token": CONFIG.API_TOKEN,
          "Accept":    "application/json",
        },
      });

      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(`API error ${res.status}${text ? ": " + text.slice(0, 120) : ""}`);
      }

      const data = await res.json();

      /* Document360 API wraps results in data.articles, data.results, or the root array */
      const articles = data?.data?.articles
                    ?? data?.data
                    ?? data?.articles
                    ?? data?.results
                    ?? (Array.isArray(data) ? data : []);

      /* Guard: only render if query hasn't changed while we were fetching */
      if (currentQuery === query) renderResults(articles, query);

    } catch (err) {
      if (currentQuery === query) {
        renderError(err.message || "Failed to fetch results. Check your API token and network connection.");
      }
    }
  }

  /* ── Event wiring ──────────────────────────────────────────── */
  input.addEventListener("input", () => {
    const val = input.value;
    clearBtn.classList.toggle("visible", val.length > 0);

    clearTimeout(debounceTimer);

    if (!val.trim()) { renderPromptState(); return; }

    debounceTimer = setTimeout(() => search(val), CONFIG.DEBOUNCE_MS);
  });

  clearBtn.addEventListener("click", () => {
    input.value = "";
    clearBtn.classList.remove("visible");
    currentQuery = "";
    clearTimeout(debounceTimer);
    renderPromptState();
    input.focus();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Escape") clearBtn.click();
  });
</script>
</body>
</html>
