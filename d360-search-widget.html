<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document360 KB Widget Demo - TopDesk Integration</title>
  <style>
    :root {
      --brand: #1E5FA8;
      --brand-light: #e8f0fb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--brand-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #1a1a2e;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--brand);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--brand);
      margin-bottom: 8px;
    }

    p {
      font-size: 13px;
      color: #5a6a80;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
  </div>
  <h1>Document360 KB Widget Demo - TopDesk Integration</h1>
  <p>Click the help button to search articles.</p>
</div>

<!-- Document360 knowledge base widget start -->
<!-- Widget key: Settings → Knowledge Base Widget → Installation & Setup → Configure & Connect → Widget JavaScript -->
<script>
    (function (w,d,s,o,f,js,fjs) {
        w['JS-Widget']=o;w[o] = w[o] || function () { (w[o].q = w[o].q || []).push(arguments) };
        js = d.createElement(s), fjs = d.getElementsByTagName(s)[0];
        js.id = o; js.src = f; js.async = 1; fjs.parentNode.insertBefore(js, fjs);
    }(window, document, 'script', 'mw', 'https://cdn.document360.io/static/js/widget.js'));
    mw('init', { apiKey: 'b7332d42-c8fa-4d46-8d4a-c9d1e7534f20' });
</script>
<!-- Document360 knowledge base widget end -->

</body>
</html>
